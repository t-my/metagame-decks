name: Weekly Metagame Decks

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      formats:
        description: 'Space-separated formats to refresh (blank = the default set)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Babashka
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          bb: latest

      - name: Download decks (MTGO .txt) + rebuild manifest
        run: |
          FORMATS="${{ github.event.inputs.formats }}"
          if [ -z "$FORMATS" ]; then
            FORMATS="standard pioneer modern legacy vintage pauper premodern"
          fi
          for f in $FORMATS; do
            echo "::group::$f"
            bb download.clj "$f"
            echo "::endgroup::"
          done
          bb download.clj manifest

      - name: Commit refreshed decks + manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A decks manifest.json
          git diff --cached --quiet || { git commit -m "Refresh metagame decks $(date +%Y-%m-%d)"; git push; }

      - name: Publish snapshot release (zip)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          zip -r metagame-decks.zip decks manifest.json
          TAG=$(date +%Y-%m-%d)
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Weekly metagame deck snapshot for $TAG" \
            metagame-decks.zip
